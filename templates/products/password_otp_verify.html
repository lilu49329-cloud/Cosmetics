{% extends 'products/register_base.html' %}
{% block title %}Xác thực OTP | Cosmetics{% endblock %}
{% block content %}
<div class="auth-title text-center mb-3" style="font-size: 2rem; font-weight: bold; color: #ff69b4;">Xác thực OTP</div>
<form method="post" autocomplete="off">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="mb-3">
        {{ form.otp.label_tag }}
        {{ form.otp }}
        {% if form.otp.errors %}
            <div class="text-danger">{{ form.otp.errors }}</div>
        {% endif %}
    </div>
    <button type="submit" class="btn btn-auth w-100 mb-2" style="font-weight:600;">Xác nhận OTP</button>
</form>
{% endblock %}
