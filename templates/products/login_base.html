<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Đăng nhập{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --nc-primary-bg: #ffe6f0;
            --nc-error-bg: #ffd6d9;
            --nc-caution-bg: #fff0d9;
            --nc-success-bg: #eafff5;
            --nc-util-bg: #fff5fa;
            --nc-util-placeholder: #ffeef5;
            --nc-util-pressed: rgba(255, 182, 193, 0.3);
        }
        body {
            background: var(--nc-primary-bg);
            min-height: 100vh;
        }
        nav, footer {
            background: #fff !important;
        }
        .login-main {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        /* 🩷 Banner container có glow nền */
        .login-banner {
            order: 1;
            border-radius: 1.5rem 0 0 1.5rem;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 400px;
            position: relative;
        }

        /* 🌈 Glow hồng phía sau banner */
        .login-banner::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 110%;
            height: 115%;
            background: radial-gradient(circle at center, #ffb6e6 0%, #ffe6f0 50%, transparent 100%);
            filter: blur(35px);
            opacity: 0.8;
            z-index: 0;
            border-radius: 2rem;
        }

        /* 🖼 Ảnh banner với fade mờ viền */
        .login-banner img {
            position: relative;
            z-index: 1;
            width: 100%;
            height: auto;
            max-width: 850px;
            max-height: 480px;
            object-fit: cover;
            background: #fff;
            border: none;
            border-radius: 1.5rem;
            opacity: 1;
            box-shadow: 0 10px 40px -10px #ff69b480;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .login-banner img:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 55px -10px #ff69b4aa, 0 0 0 4px #fff;
        }

        @media (min-width: 1400px) {
            .login-banner img {
                max-width: 950px;
                max-height: 520px;
            }
        }

        .login-banner h1 {
            color: #ff69b4;
            font-size: 2.2rem;
            font-weight: bold;
            margin-top: 1rem;
            letter-spacing: 2px;
            position: relative;
            z-index: 2;
        }

        /* Form container */
        .login-form-container {
            order: 2;
            margin-left: 0;
            background: #fff !important;
            border-radius: 0 1.5rem 1.5rem 0;
            box-shadow: 0 4px 24px 0 #ffb6e655;
            padding: 2.5rem 2.5rem 2rem 2.5rem;
            min-width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: #18141c;
        }

        .auth-title {
            color: #ff69b4;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        .login-form-container label {
            color: #ff69b4 !important;
            font-weight: 600;
        }

        .login-form-container input[type="text"],
        .login-form-container input[type="password"],
        .login-form-container input[type="email"],
        .login-form-container input[type="number"],
        .login-form-container input[type="tel"],
        .login-form-container input[type="search"],
        .login-form-container input[type="url"],
        .login-form-container input[type="date"],
        .login-form-container input[type="datetime-local"],
        .login-form-container input[type="month"],
        .login-form-container input[type="week"],
        .login-form-container select,
        .login-form-container textarea {
            background: #fff;
            color: #18141c;
            border: 1px solid #ff69b4;
        }

        .login-form-container input:focus,
        .login-form-container select:focus,
        .login-form-container textarea:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 0 0.2rem var(--nc-util-pressed);
            color: #18141c;
            background: #ffeef5;
        }

        .btn-auth {
            background: #ff69b4;
            color: #18141c;
            font-weight: bold;
            border: none;
            border-radius: 0.7rem;
            padding: 0.7rem 1.5rem;
            width: 100%;
            font-size: 1.1rem;
        }

        .btn-auth:hover {
            background: #fff0f6;
            color: #ff69b4;
        }

        .login-form-container a {
            color: #ff69b4;
            text-decoration: none;
        }
        .login-form-container a:hover {
            text-decoration: underline;
        }

        .or-divider {
            text-align: center;
            margin: 1.5rem 0 1rem 0;
            color: #aaa;
        }
        .social-btns {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .social-btns button {
            flex: 1;
            border-radius: 0.5rem;
            border: 1px solid #eee;
            background: #fff0f6;
            color: #ff69b4;
            font-weight: 600;
            padding: 0.5rem 0;
            transition: background 0.2s;
        }
        .social-btns button:hover {
            background: #ff69b4;
            color: #18141c;
        }
        @keyframes pulse {
          0% { box-shadow:0 2px 8px #ff69b4a0, 0 0 0 0 #ff69b4a0; }
          100% { box-shadow:0 2px 16px #ff69b4cc, 0 0 0 8px #ffe6f055; }
        }
        @keyframes bounce {
          0% { transform: translateY(0); }
          100% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
    <nav class="w-100 py-3" style="box-shadow:0 2px 8px #ff69b433; position:relative;">
        <div class="container d-flex align-items-center" style="gap:14px;">
            <img src="{% static 'images/logoshop.png' %}" alt="Cosmetics Logo" style="height:44px;width:auto;">
            <span style="font-family:Arial Black;font-size:2.1rem;color:#ff69b4;letter-spacing:1px;">Cosmetics</span>
            <span style="position:absolute; right:32px; top:18px; font-size:1.45rem; color:#ff69b4; font-weight:500; letter-spacing:1px; background:transparent; padding:0; border-radius:0; box-shadow:none; text-shadow:none; border:none; display:flex; align-items:center; gap:8px; cursor:pointer; font-style:italic; font-family:'Poppins', Arial, sans-serif;">
                Khám phá ngay
                <span style="color:#ff69b4; font-size:1.7rem; font-weight:bold; margin-left:4px; animation:bounce 1.2s infinite alternate; line-height:1; font-style:italic;">❗</span>
            </span>
        </div>
    </nav>
    <main>
        <div class="login-main">
            <section class="login-banner d-none d-md-flex" aria-label="Giới thiệu">
                <img src="{% static 'images/banner1.png' %}" alt="Cosmetics Banner">
                <h1>Đẹp tự tin - Tỏa sáng mỗi ngày!</h1>
            </section>
            <section class="login-form-container" aria-label="Đăng nhập">
                {% block content %}{% endblock %}
            </section>
        </div>
    </main>
    <footer class="w-100 py-3 mt-4" style="box-shadow:0 -6px 24px -8px #ffb6e6cc;">
        <div class="container d-flex align-items-center" style="gap:10px;">
            <img src="{% static 'images/logoshop.png' %}" alt="Cosmetics Logo" style="height:32px;width:auto;">
            <span style="color:#ff69b4;font-size:1rem;font-family:Arial Black;">&copy; 2025 Cosmetics. All rights reserved.</span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
